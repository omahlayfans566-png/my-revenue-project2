<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>DateClone - Offline</title><style>body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#fff5f7,#fce4ec);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}*{box-sizing:border-box}.offline-card{background:white;border-radius:24px;padding:48px 32px;max-width:400px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.1)}.icon{width:80px;height:80px;background:linear-gradient(135deg,#ff1744,#ff4081);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:0 8px 24px rgba(255,64,129,.3)}.icon span{color:white;font-size:40px;font-weight:800;font-family:Georgia,serif}h1{font-size:1.5rem;color:#1a1a2e;margin-bottom:8px;font-weight:700}p{color:#6b6b80;font-size:.95rem;line-height:1.6;margin-bottom:0}.retry-btn{display:inline-flex;align-items:center;gap:8px;margin-top:24px;padding:12px 24px;background:linear-gradient(135deg,#ff1744,#ff4081);color:white;border:none;border-radius:12px;font-size:.9375rem;font-weight:600;cursor:pointer;transition:transform .2s}.retry-btn:hover{transform:translateY(-2px)}</style></head><body><div class="offline-card"><div class="icon"><span>D</span></div><h1>You&rsquo;re Offline</h1><p>DateClone needs an internet connection to work. Please check your connection and try again.</p><button class="retry-btn" onclick="location.reload()">Try Again</button></div></body></html>
